<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ section.title }} - Josh Fairhead</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: #1e293b;
            background: white;
            position: relative;
            overflow-x: hidden;
        }

        body > * {
            position: relative;
            z-index: 1;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Hero Section */
        .hero {
            min-height: 82vh;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background: white;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: -30%;
            width: 160%;
            height: 160%;
            background:
                radial-gradient(35vw 35vh at 19% 19%, rgba(220, 38, 38, 0.08) 0%, transparent 100%),
                radial-gradient(40vw 40vh at 62% 19%, rgba(34, 197, 94, 0.35) 0%, transparent 100%),
                radial-gradient(40vw 40vh at 81% 81%, rgba(59, 130, 246, 0.2) 0%, transparent 100%);
            animation: hero-drift 18s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes hero-drift {
            0%, 100% {
                transform: translate(0%, 0%) rotate(0deg);
            }
            25% {
                transform: translate(-6%, -8%) rotate(2deg);
            }
            50% {
                transform: translate(4%, 6%) rotate(-1deg);
            }
            75% {
                transform: translate(8%, -4%) rotate(1deg);
            }
        }

        .hero > * {
            position: relative;
            z-index: 1;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(30, 64, 175, 0.4) 30%, rgba(30, 64, 175, 0.4) 70%, transparent);
            z-index: 2;
        }

        .hero__curves {
            position: absolute;
            inset: 2% 0;
            width: 100%;
            height: 96%;
            z-index: 0;
            opacity: 0.45;
        }

        .hero__headline {
            font-size: 2.25rem;
            font-weight: 300;
            letter-spacing: -0.02em;
            color: #1e293b;
            margin-bottom: 0;
            white-space: nowrap;
            width: 100%;
        }

        .hero__subtext {
            font-size: 1.0625rem;
            color: #64748b;
            max-width: 620px;
            margin: 0 auto 2.5rem;
            line-height: 1.7;
            background: rgba(248, 250, 252, 0.8);
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 1.5rem 2rem;
            text-align: center;
        }

        /* About Section */
        .about {
            padding: 5rem 0;
            text-align: center;
        }

        .about__divider {
            width: 60px;
            height: 2px;
            background: #1e40af;
            margin: 0 auto 2rem;
        }

        .about__text {
            font-size: 1.1875rem;
            color: #1e293b;
            max-width: 620px;
            margin: 0 auto;
            line-height: 1.7;
        }

        .about__text + .about__text {
            margin-top: 1.25rem;
        }

        .about__h1,
        .about__h3,
        .about__h2 {
            background-size: 100% 100%;
            background-repeat: no-repeat;
            padding: 0.1em 0.2em;
            box-decoration-break: clone;
            -webkit-box-decoration-break: clone;
        }

        .about__h1 {
            background-image: linear-gradient(
                104deg,
                rgba(220, 38, 38, 0) 0.9%,
                rgba(220, 38, 38, 0.06) 2.4%,
                rgba(220, 38, 38, 0.05) 92%,
                rgba(220, 38, 38, 0.03) 98%,
                rgba(220, 38, 38, 0) 100%
            );
        }

        .about__h3 {
            background-image: linear-gradient(
                102deg,
                rgba(34, 197, 94, 0) 0.9%,
                rgba(34, 197, 94, 0.06) 2.4%,
                rgba(34, 197, 94, 0.05) 92%,
                rgba(34, 197, 94, 0.03) 98%,
                rgba(34, 197, 94, 0) 100%
            );
        }

        .about__h2 {
            background-image: linear-gradient(
                106deg,
                rgba(59, 130, 246, 0) 0.9%,
                rgba(59, 130, 246, 0.06) 2.4%,
                rgba(59, 130, 246, 0.05) 92%,
                rgba(59, 130, 246, 0.03) 98%,
                rgba(59, 130, 246, 0) 100%
            );
        }

        /* Journey Section */
        .journey {
            padding: 5rem 0;
        }

        .section-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #1e40af;
            margin-bottom: 0.75rem;
            text-align: center;
        }

        .section-divider {
            width: 60px;
            height: 2px;
            background: #1e40af;
            margin: 0 auto 2rem;
        }

        .journey__grid {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .journey__phase {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            max-width: 220px;
        }

        .journey__hex {
            width: 200px;
            height: 231px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
            color: #1e293b;
            filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.08));
            transition: filter 0.2s;
        }

        .journey__hex:hover {
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.12));
        }

        .journey__hex--h1 {
            background: rgba(220, 38, 38, 0.06);
        }

        .journey__hex--h2 {
            background: rgba(59, 130, 246, 0.06);
        }

        .journey__hex--h3 {
            background: rgba(34, 197, 94, 0.06);
        }

        .journey__desc {
            margin-top: 1.25rem;
            font-size: 0.9375rem;
            color: #64748b;
            line-height: 1.6;
            text-align: center;
        }

        /* Methodologies Section */
        .methodologies {
            padding: 4rem 0;
        }

        .methodologies__grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            justify-items: center;
            max-width: 680px;
            margin: 0 auto;
        }

        .methodology-card {
            width: 155px;
            height: 179px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            background: #eef2ff;
            filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.1));
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 3rem 1.5rem;
            text-decoration: none;
            color: inherit;
            transition: filter 0.2s, background 0.2s;
        }

        .methodology-card:hover {
            background: #dbeafe;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.14));
        }

        /* Inverse tetraktys: 4-3-2-1 */
        /* Row 1: 4 hexagons */
        .methodology-card:nth-child(1) { grid-column: 1 / 3; grid-row: 1; }
        .methodology-card:nth-child(2) { grid-column: 3 / 5; grid-row: 1; }
        .methodology-card:nth-child(3) { grid-column: 5 / 7; grid-row: 1; }
        .methodology-card:nth-child(4) { grid-column: 7 / 9; grid-row: 1; }

        /* Row 2: 3 hexagons, offset */
        .methodology-card:nth-child(5) { grid-column: 2 / 4; grid-row: 2; }
        .methodology-card:nth-child(6) { grid-column: 4 / 6; grid-row: 2; }
        .methodology-card:nth-child(7) { grid-column: 6 / 8; grid-row: 2; }

        /* Row 3: 2 hexagons, centered */
        .methodology-card:nth-child(8) { grid-column: 3 / 5; grid-row: 3; }
        .methodology-card:nth-child(9) { grid-column: 5 / 7; grid-row: 3; }

        /* Row 4: 1 hexagon, centered */
        .methodology-card:nth-child(10) { grid-column: 4 / 6; grid-row: 4; }

        /* Overlap rows for honeycomb nesting */
        .methodology-card:nth-child(n+5) {
            margin-top: -38px;
        }

        .methodology-card__title {
            font-size: 0.875rem;
            font-weight: 600;
            color: #1e293b;
        }

        .methodology-card__description {
            display: none;
        }

        /* Social Proof Carousel */
        .social-proof {
            padding: 4rem 0 3rem;
        }

        .carousel {
            overflow: hidden;
            width: 100%;
            mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
        }

        .carousel__track {
            display: flex;
            gap: 1.5rem;
            animation: carousel-scroll 40s linear infinite;
            width: max-content;
        }

        .carousel__track:hover {
            animation-play-state: paused;
        }

        @keyframes carousel-scroll {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }

        .carousel__card {
            flex-shrink: 0;
            width: 320px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 1.75rem 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .carousel__quote {
            font-size: 0.9375rem;
            color: #334155;
            line-height: 1.7;
            font-style: italic;
            margin-bottom: 1rem;
        }

        .carousel__author {
            font-size: 0.8125rem;
            font-weight: 600;
            color: #1e40af;
        }

        /* CTA Section */
        .cta {
            padding: 5rem 0;
            text-align: center;
            background: #f8fafc;
        }

        .cta__headline {
            font-size: 1.5rem;
            font-weight: 400;
            color: #1e293b;
            margin-bottom: 1.5rem;
        }

        .cta__button {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: transparent;
            color: #1e293b;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            border: 2.5px solid #1e293b;
            border-radius: 2px 8px 2px 8px;
            transition: background 0.2s, transform 0.15s;
            position: relative;
            box-shadow: 3px 3px 0 #94a3b8;
        }

        .cta__button:hover {
            background: #f1f5f9;
            transform: translate(1px, 1px);
            box-shadow: 2px 2px 0 #94a3b8;
        }

        /* Footer */
        .footer {
            padding: 3rem 0;
            text-align: center;
            font-size: 0.8125rem;
            color: #94a3b8;
            letter-spacing: 0.5px;
        }

        .footer a {
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.15s;
        }

        .footer a:hover {
            color: #1e40af;
        }

        /* Responsive - Tablet */
        @media (max-width: 768px) {
            .about {
                padding: 3.5rem 0;
            }

            .about__text {
                font-size: 1.0625rem;
            }

            .journey {
                padding: 3.5rem 0;
            }

            .methodologies {
                padding: 3rem 0;
            }
        }

        /* Responsive - Mobile */
        @media (max-width: 640px) {
            .container {
                padding: 0 1.25rem;
            }

            .hero {
                min-height: 50vh;
            }

            .hero__headline {
                font-size: 1.5rem;
                white-space: normal;
            }

            .hero__subtext {
                font-size: 1rem;
            }

            .about {
                padding: 2.5rem 0;
            }

            .about__text {
                font-size: 0.9375rem;
                line-height: 1.8;
            }

            .journey {
                padding: 2.5rem 0;
            }

            .journey__grid {
                flex-direction: column;
                align-items: center;
                gap: 2rem;
            }

            .journey__phase {
                max-width: 300px;
            }

            .journey__hex {
                width: 160px;
                height: 185px;
                font-size: 0.9375rem;
            }

            .journey__desc {
                font-size: 0.875rem;
            }

            .methodologies {
                padding: 2.5rem 0;
            }

            .methodologies__grid {
                grid-template-columns: repeat(6, 1fr);
                max-width: 420px;
                gap: 6px;
            }

            .methodology-card {
                width: 100%;
                height: auto;
                aspect-ratio: 1 / 1.155;
                padding: 0 0.5rem;
            }

            /* Mobile honeycomb: 3-2-3-2 */
            .methodology-card:nth-child(1) { grid-column: 1 / 3; grid-row: 1; }
            .methodology-card:nth-child(2) { grid-column: 3 / 5; grid-row: 1; }
            .methodology-card:nth-child(3) { grid-column: 5 / 7; grid-row: 1; }
            .methodology-card:nth-child(4) { grid-column: 2 / 4; grid-row: 2; }
            .methodology-card:nth-child(5) { grid-column: 4 / 6; grid-row: 2; }
            .methodology-card:nth-child(6) { grid-column: 1 / 3; grid-row: 3; }
            .methodology-card:nth-child(7) { grid-column: 3 / 5; grid-row: 3; }
            .methodology-card:nth-child(8) { grid-column: 5 / 7; grid-row: 3; }
            .methodology-card:nth-child(9) { grid-column: 2 / 4; grid-row: 4; }
            .methodology-card:nth-child(10) { grid-column: 4 / 6; grid-row: 4; }

            .methodology-card:nth-child(n+4) { margin-top: clamp(-40px, -8.5vw, -25px); }

            .methodology-card__title {
                font-size: clamp(0.625rem, 2vw, 0.8125rem);
            }

            .carousel__card {
                width: 260px;
                padding: 1.25rem 1rem;
            }

            .carousel__quote {
                font-size: 0.875rem;
            }

            .cta {
                padding: 3rem 0;
            }

            .cta__headline {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    {{ section.content | safe }}

    <footer class="footer">
        <div class="container">
            <a href="{{ config.base_url }}">Josh Fairhead</a> · <a href="mailto:hello@joshafairhead.com">hello@joshafairhead.com</a>
        </div>
    </footer>
</body>
</html>
